<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velscents | Premium Inspired Fragrances</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">

<body>
<style>

   
        /* --- DESIGN SYSTEM & VARIABLES --- */
        :root {
            --bg-pure: #ffffff;
            --bg-offwhite: #f9f9f9;
            --bg-dark-footer: #151515;
            --text-dark: #111111;
            --text-muted: #666666;
            --text-light-muted: #999999;
            --accent-gold: #b39250;
            --accent-red: #d93838;
            --font-display: 'Cinzel', serif;
            --font-sans: 'Inter', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* --- GLOBAL RESETS --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-pure);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        /* --- ANNOUNCEMENT BANNER --- */
        .promo-banner {
            background-color: var(--text-dark);
            color: #ffffff;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px 20px;
            font-weight: 400;
        }

        /* --- HEADER NAVIGATION --- */
        .main-header {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #eeeeee;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
        }

        .logo a {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-dark);
        }

        .nav-menu {
            display: flex;
            gap: 32px;
        }

        .nav-item {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent-gold);
        }

        /* HEADER ACTIONS & DROPDOWNS */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .action-btn {
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            position: relative;
        }

        .action-btn:hover {
            color: var(--accent-gold);
        }

        /* Cart Badge */
        .cart-icon-wrapper {
            position: relative;
        }

        .cart-count {
            background-color: var(--text-dark);
            color: #ffffff;
            font-size: 0.7rem;
            border-radius: 50%;
            padding: 2px 7px;
            position: absolute;
            top: -10px;
            right: -16px;
            font-weight: 600;
        }

        /* --- SLIDE DOWN SEARCH BAR OVERLAY --- */
        .search-overlay {
            position: fixed;
            top: -120px;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: var(--bg-pure);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            z-index: 120;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
        }

        .search-overlay.active {
            top: 0;
        }

        .search-form-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 50px 12px 16px;
            font-family: var(--font-sans);
            font-size: 1rem;
            border: 1px solid #cccccc;
            border-radius: 4px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--text-dark);
        }

        .close-search {
            position: absolute;
            right: 16px;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-muted);
        }

        /* --- HERO SECTION --- */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://cdn.corenexis.com/f/bjNYTE6hqUQ.png') center/cover no-repeat;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            letter-spacing: 6px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .hero-content p {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .btn-luxury {
            display: inline-block;
            background-color: #ffffff;
            color: var(--text-dark);
            padding: 14px 36px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            border: 1px solid #ffffff;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .btn-luxury:hover {
            background-color: transparent;
            color: #ffffff;
        }

        /* --- PRODUCT SHOWCASE SECTION --- */
        .section-container {
            max-width: 1300px;
            margin: 80px auto;
            padding: 0 24px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 48px;
        }

        .section-title h2 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .section-title p {
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 24px;
        }

        .product-card {
            background: var(--bg-pure);
            position: relative;
            transition: var(--transition-smooth);
        }

        /* Used to filter products seamlessly via script */
        .product-card.hidden {
            display: none !important;
        }

        .image-wrapper {
            background-color: var(--bg-offwhite);
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image {
            width: 80%;
            height: auto;
            object-fit: contain;
            transition: var(--transition-smooth);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .badge-sale {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent-red);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 4px 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .inspired-tag {
            color: var(--accent-gold);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-top: 16px;
            display: block;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 6px 0 8px 0;
            letter-spacing: 0.5px;
        }

        .price-container {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            font-size: 1.05rem;
        }

        .sale-price {
            font-weight: 600;
            color: var(--text-dark);
        }

        .regular-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .btn-add-cart {
            width: 100%;
            background-color: var(--text-dark);
            color: #ffffff;
            border: 1px solid var(--text-dark);
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-add-cart:hover {
            background-color: var(--bg-pure);
            color: var(--text-dark);
        }

        /* --- ACCOUNT SECTION --- */
        .account-section {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px 24px;
            background-color: var(--bg-offwhite);
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: none;
        }

        .account-section h2 {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .account-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .account-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .account-input {
            width: 100%;
            padding: 14px;
            font-family: var(--font-sans);
            font-size: 1rem;
            border: 1px solid #cccccc;
            border-radius: 4px;
            outline: none;
        }

        .account-input:focus {
            border-color: var(--text-dark);
        }

        .btn-account-submit {
            background-color: var(--text-dark);
            color: #ffffff;
            border: 1px solid var(--text-dark);
            padding: 14px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-account-submit:hover {
            background-color: transparent;
            color: var(--text-dark);
        }

        /* --- SHOPPING CART DRAWER PANEL --- */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background-color: var(--bg-pure);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 200;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 150;
            display: none;
        }

        .cart-overlay.active {
            display: block;
        }

        .cart-header {
            padding: 24px;
            border-bottom: 1px solid #eeeeee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .btn-close-cart {
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .cart-items-body {
            padding: 24px;
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .empty-cart-text {
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
            font-size: 0.95rem;
        }

        .cart-item {
            display: flex;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 16px;
        }

        .cart-item-img {
            width: 70px;
            height: 80px;
            background-color: var(--bg-offwhite);
            object-fit: contain;
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .cart-item-price {
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .cart-footer {
            padding: 24px;
            border-top: 1px solid #eeeeee;
            background-color: var(--bg-offwhite);
        }

        .cart-total-wrapper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .btn-checkout {
            width: 100%;
            background-color: var(--text-dark);
            color: #ffffff;
            padding: 14px;
            text-align: center;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        /* --- PREMIUM LUXURY FOOTER --- */
        .premium-footer {
            background-color: var(--bg-dark-footer);
            color: #ffffff;
            padding: 70px 24px 30px 24px;
            font-family: var(--font-sans);
        }

        .footer-grid {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 0.8fr 1.2fr;
            gap: 40px;
            border-bottom: 1px solid #292929;
            padding-bottom: 50px;
        }

        .footer-brand h3 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }

        .footer-brand p {
            color: var(--text-light-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .footer-column h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            color: #ffffff;
            font-weight: 600;
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-links a {
            color: var(--text-light-muted);
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: #ffffff;
            padding-left: 4px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
            color: var(--text-light-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .contact-info strong {
            color: #ffffff;
            display: block;
            margin-bottom: 2px;
        }

        .footer-bottom {
            max-width: 1300px;
            margin: 30px auto 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-copyright {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-socials {
            display: flex;
            gap: 20px;
        }

        .footer-socials a {
            color: var(--text-light-muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-socials a:hover {
            color: var(--accent-gold);
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 999;
            font-size: 1.6rem;
            font-weight: bold;
        }
        
        .whatsapp-float:hover {
            transform: scale(1.08);
            background-color: #20ba5a;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 900px) {
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .footer-grid {
                grid-template-columns: 1fr;
            }
            .nav-menu {
                display: none;
            }
        }

<script>
        // ---------- Element references ----------
        const heroBanner      = document.getElementById('hero-banner');
        const productsView    = document.getElementById('products-view');
        const accountView     = document.getElementById('account-view');
        const navItems        = document.querySelectorAll('.nav-item');
        const productCards    = document.querySelectorAll('.product-card');

        const searchTrigger   = document.getElementById('search-trigger');
        const searchOverlay   = document.getElementById('search-overlay');
        const searchClose     = document.getElementById('search-close');
        const searchInput     = document.getElementById('search-input');

        const accountTrigger  = document.getElementById('account-trigger-btn');

        const cartTrigger     = document.getElementById('cart-trigger');
        const cartDrawer      = document.getElementById('cart-drawer');
        const cartOverlay     = document.getElementById('cart-overlay');
        const cartClose       = document.getElementById('cart-close');
        const cartCounter     = document.getElementById('cart-counter');
        const cartItemsBody   = document.getElementById('cart-items-container');
        const cartSubtotalVal = document.getElementById('cart-subtotal-val');

        const exploreBtn      = document.getElementById('explore-btn');

        let cart = [];

        // ---------- View switching (Home / Men / Women / Best Sellers / Account) ----------
        function showProductsView() {
            heroBanner.style.display = '';
            productsView.style.display = '';
            accountView.style.display = 'none';
        }

        function filterProducts(target) {
            productCards.forEach(card => {
                if (target === 'all') {
                    card.classList.remove('hidden');
                    return;
                }
                let cats = [];
                try { cats = JSON.parse(card.dataset.cats || '[]'); } catch (e) { cats = []; }
                if (cats.includes(target)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        function activateCategory(target) {
            navItems.forEach(n => n.classList.remove('active'));
            const matchingNav = Array.from(navItems).find(n => n.dataset.target === target);
            if (matchingNav) matchingNav.classList.add('active');

            showProductsView();
            filterProducts(target);
            heroBanner.style.display = (target === 'all') ? '' : 'none';
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const target = item.dataset.target;
                // Save the chosen category in the URL so a refresh keeps you here
                // instead of always resetting back to Home.
                window.location.hash = (target === 'all') ? '' : target;
                activateCategory(target);
            });
        });

        accountTrigger.addEventListener('click', () => {
            heroBanner.style.display = 'none';
            productsView.style.display = 'none';
            accountView.style.display = 'block';
        });

        exploreBtn.addEventListener('click', () => {
            productsView.scrollIntoView({ behavior: 'smooth' });
        });

        // ---------- Search overlay ----------
        searchTrigger.addEventListener('click', () => {
            searchOverlay.classList.add('active');
            searchInput.focus();
        });

        searchClose.addEventListener('click', () => {
            searchOverlay.classList.remove('active');
        });

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim().toUpperCase();
            productCards.forEach(card => {
                const title = card.dataset.title || '';
                card.classList.toggle('hidden', query.length > 0 && !title.includes(query));
            });
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                searchOverlay.classList.remove('active');
                showProductsView();
            }
        });

        // ---------- Cart drawer open/close ----------
        function openCart() {
            cartDrawer.classList.add('active');
            cartOverlay.classList.add('active');
        }

        function closeCart() {
            cartDrawer.classList.remove('active');
            cartOverlay.classList.remove('active');
        }

        cartTrigger.addEventListener('click', openCart);
        cartClose.addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        // ---------- Cart data + rendering ----------
        function priceToNumber(priceStr) {
            return parseInt(String(priceStr).replace(/[^0-9]/g, ''), 10) || 0;
        }

        function renderCart() {
            cartCounter.textContent = cart.length;

            if (cart.length === 0) {
                cartItemsBody.innerHTML = '<p class="empty-cart-text">Your shopping cart is currently empty.</p>';
                cartSubtotalVal.textContent = 'Rs. 0';
                return;
            }

            let subtotal = 0;
            cartItemsBody.innerHTML = cart.map((item, index) => {
                subtotal += priceToNumber(item.price);
                return `
                    <div class="cart-item">
                        <img src="${item.imgSrc}" alt="${item.title}" class="cart-item-img">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price">${item.price}</div>
                        </div>
                        <span data-remove-index="${index}" style="cursor:pointer; color: var(--text-muted); font-size: 0.85rem;">&times;</span>
                    </div>
                `;
            }).join('');

            cartSubtotalVal.textContent = 'Rs. ' + subtotal.toLocaleString('en-PK');

            cartItemsBody.querySelectorAll('[data-remove-index]').forEach(el => {
                el.addEventListener('click', () => {
                    removeFromCart(parseInt(el.dataset.removeIndex, 10));
                });
            });
        }

        async function callCartApi(payload) {
            const res = await fetch('manage_cart.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            return res.json();
        }

        async function loadCart() {
            const data = await callCartApi({ action: 'get' });
            if (data.success) {
                cart = data.cart || [];
                renderCart();
            }
        }

        async function addToCart(title, price, imgSrc) {
            const data = await callCartApi({ action: 'add', title, price, imgSrc });
            if (data.success) {
                cart = data.cart || [];
                renderCart();
                openCart();
            }
        }

        async function removeFromCart(index) {
            const data = await callCartApi({ action: 'remove', index });
            if (data.success) {
                cart = data.cart || [];
                renderCart();
            }
        }

        document.querySelectorAll('.btn-add-cart').forEach(btn => {
            btn.addEventListener('click', () => {
                const card = btn.closest('.product-card');
                const title = card.querySelector('.product-title').textContent.trim();
                const price = card.querySelector('.sale-price').textContent.trim();
                const imgSrc = card.querySelector('.product-image').src;
                addToCart(title, price, imgSrc);
            });
        });

        // ---------- Init ----------
        function restoreFromHash() {
            const target = window.location.hash ? window.location.hash.substring(1) : 'all';
            const validTargets = Array.from(navItems).map(n => n.dataset.target);
            activateCategory(validTargets.includes(target) ? target : 'all');
        }

        window.addEventListener('hashchange', restoreFromHash);
        restoreFromHash();
        loadCart();
    </script>
